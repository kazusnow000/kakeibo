<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>家計簿</title>
<style>
  :root {
    --ink: #1F2A33;       /* 墨（黒字） */
    --vermilion: #C0443E; /* 朱（赤字・支出） */
    --indigo: #35597A;    /* 藍（収入） */
    --paper: #F6F6F2;
    --card: #FFFFFF;
    --line: #DDDCD4;
    --sub: #7A7A70;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--paper); color: var(--ink);
    font-family: "Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic UI","Yu Gothic","Meiryo",sans-serif;
    font-size: 15px;
    -webkit-text-size-adjust: 100%;
  }
  .num {
    font-family: "Hiragino Mincho ProN","Yu Mincho","MS PMincho",serif;
    font-variant-numeric: tabular-nums;
  }
  header {
    padding: 14px 18px 10px; border-bottom: 1px solid var(--line);
    display: flex; align-items: baseline; gap: 8px;
  }
  header .title { font-family: "Hiragino Mincho ProN","Yu Mincho",serif; font-size: 20px; letter-spacing: 0.2em; }
  header .sub { font-size: 11px; color: var(--sub); }
  main { max-width: 560px; margin: 0 auto; padding: 16px 16px 96px; }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 16px; margin-bottom: 14px; }
  .card-title { font-size: 13px; color: var(--sub); margin-bottom: 10px; }
  label.field { font-size: 12px; color: var(--sub); display: block; margin-bottom: 4px; }
  input, select {
    width: 100%; padding: 10px 12px; border: 1px solid var(--line); border-radius: 8px;
    font-size: 16px; font-family: inherit; background: var(--card); color: var(--ink); outline: none;
  }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .stack { display: grid; gap: 12px; }
  .btn {
    width: 100%; padding: 13px 0; border-radius: 10px; font-size: 16px; font-family: inherit;
    border: none; cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  .btn-primary { background: var(--ink); color: #fff; }
  .btn-income  { background: var(--indigo); color: #fff; }
  .btn-ghost   { background: transparent; color: var(--ink); border: 1px solid var(--line); font-size: 15px; padding: 12px 0; }
  .btn-danger  { background: transparent; color: var(--vermilion); border: 1px solid var(--vermilion); font-size: 15px; padding: 12px 0; }
  .toggle { display: flex; border: 1px solid var(--line); border-radius: 10px; overflow: hidden; margin-bottom: 14px; }
  .toggle button { flex: 1; padding: 10px 0; border: none; background: transparent; color: var(--sub); font-size: 15px; font-family: inherit; cursor: pointer; }
  .toggle button.on-expense { background: var(--ink); color: #fff; }
  .toggle button.on-income  { background: var(--indigo); color: #fff; }
  .month-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .month-nav .label { font-size: 17px; font-weight: 600; }
  .month-nav button { width: 44px; padding: 10px 0; border: 1px solid var(--line); border-radius: 10px; background: transparent; font-size: 15px; cursor: pointer; color: var(--ink); }
  .balance-card { text-align: center; padding: 22px 16px; }
  .balance-label { font-size: 12px; color: var(--sub); letter-spacing: 0.15em; }
  .balance-amount { font-size: 38px; margin: 6px 0 2px; }
  .badge { display: inline-block; font-size: 12px; padding: 2px 10px; border-radius: 999px; border: 1px solid; }
  .io-row { display: flex; justify-content: center; gap: 28px; margin-top: 16px; font-size: 13px; }
  .prev { font-size: 12px; color: var(--sub); margin-top: 10px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { color: var(--sub); font-size: 11px; font-weight: 400; padding: 6px 2px; }
  td { padding: 10px 2px; border-top: 1px solid var(--line); }
  .r { text-align: right; }
  .cat-row { display: flex; align-items: center; gap: 8px; padding: 7px 0; }
  .cat-name { width: 84px; font-size: 13px; flex-shrink: 0; }
  .cat-bar-wrap { flex: 1; }
  .cat-bar { height: 14px; border-radius: 0 4px 4px 0; background: var(--vermilion); min-width: 2px; }
  .cat-amt { width: 88px; text-align: right; font-size: 14px; flex-shrink: 0; }
  .trend-chart { display: flex; align-items: flex-end; gap: 6px; height: 150px; padding-top: 8px; }
  .trend-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; height: 100%; justify-content: flex-end; }
  .trend-bars { display: flex; gap: 2px; align-items: flex-end; height: 100%; width: 100%; justify-content: center; }
  .tb { width: 38%; max-width: 14px; border-radius: 3px 3px 0 0; }
  .tb-in { background: var(--indigo); }
  .tb-ex { background: var(--vermilion); }
  .trend-mon { font-size: 10px; color: var(--sub); }
  .legend { display: flex; gap: 16px; justify-content: center; font-size: 12px; color: var(--sub); margin-top: 8px; }
  .legend .dot { display: inline-block; width: 9px; height: 9px; border-radius: 2px; margin-right: 4px; vertical-align: -1px; }
  .filters { display: flex; gap: 8px; margin-bottom: 12px; }
  .chip { padding: 6px 14px; border-radius: 999px; font-size: 13px; border: 1px solid var(--line); background: transparent; color: var(--sub); font-family: inherit; cursor: pointer; }
  .chip.on { background: var(--ink); color: #fff; border-color: var(--ink); }
  .rec { display: flex; align-items: stretch; gap: 10px; padding: 12px 0; border-top: 1px solid var(--line); cursor: pointer; }
  .rec-mark { width: 4px; border-radius: 2px; flex-shrink: 0; }
  .rec-body { flex: 1; min-width: 0; }
  .rec-main { font-size: 14px; }
  .rec-store { color: var(--sub); font-size: 12px; margin-left: 6px; }
  .rec-meta { font-size: 11px; color: var(--sub); }
  .rec-amt { align-self: center; font-size: 16px; }
  .empty { color: var(--sub); font-size: 14px; padding: 14px 0; }
  nav {
    position: fixed; bottom: 0; left: 0; right: 0; display: flex; z-index: 10;
    background: var(--card); border-top: 1px solid var(--line);
    padding-bottom: env(safe-area-inset-bottom);
  }
  nav button {
    flex: 1; padding: 12px 0 14px; border: none; background: transparent; cursor: pointer;
    font-family: inherit; font-size: 13px; color: var(--sub); border-top: 2px solid transparent;
  }
  nav button.on { color: var(--ink); border-top-color: var(--ink); font-weight: 600; }
  #modal-overlay {
    position: fixed; inset: 0; background: rgba(31,42,51,0.45); z-index: 20;
    display: none; align-items: flex-end; justify-content: center;
  }
  #modal-overlay.show { display: flex; }
  #modal {
    background: var(--card); border-radius: 16px 16px 0 0; padding: 18px;
    width: 100%; max-width: 560px; padding-bottom: calc(18px + env(safe-area-inset-bottom));
  }
  #modal h3 { font-size: 15px; margin: 0 0 12px; }
  .modal-btns { display: grid; grid-template-columns: 1fr 1fr 2fr; gap: 10px; margin-top: 16px; }
  #toast {
    position: fixed; bottom: 84px; left: 50%; transform: translateX(-50%);
    background: var(--ink); color: #fff; font-size: 13px; padding: 9px 18px;
    border-radius: 999px; z-index: 30; white-space: nowrap; display: none;
  }
  .note { font-size: 12px; color: var(--sub); line-height: 1.7; }
</style>
</head>
<body>

<header>
  <div class="title">家計簿</div>
  <div class="sub">手入力で収支を記録・iPhone内に保存</div>
</header>

<main>
  <!-- 入力タブ -->
  <section id="tab-input">
    <div class="card">
      <div class="card-title">登録</div>
      <div class="toggle">
        <button id="type-expense" class="on-expense">支出</button>
        <button id="type-income">収入</button>
      </div>
      <div class="stack">
        <div class="grid2">
          <div><label class="field">日付</label><input type="date" id="f-date"></div>
          <div><label class="field">金額（円）*</label><input type="number" id="f-amount" inputmode="numeric" min="1" placeholder="0"></div>
        </div>
        <div><label class="field">カテゴリ *</label><select id="f-category"></select></div>
        <div><label class="field" id="f-store-label">店名・支払先</label><input type="text" id="f-store" placeholder="例: AEON"></div>
        <div><label class="field">メモ</label><input type="text" id="f-memo"></div>
      </div>
      <button class="btn btn-primary" id="f-save" style="margin-top:14px">支出を保存する</button>
    </div>
  </section>

  <!-- 月次タブ -->
  <section id="tab-monthly" hidden></section>

  <!-- 推移タブ -->
  <section id="tab-trend" hidden></section>

  <!-- 履歴タブ -->
  <section id="tab-history" hidden></section>

  <!-- データタブ -->
  <section id="tab-data" hidden>
    <div class="card">
      <div class="card-title">バックアップ（書き出し）</div>
      <p class="note">全データをJSONファイルとして書き出します。iPhoneの「ファイル」アプリに保存できます。ブラウザのデータは端末の空き容量整理などで消えることがあるため、月に一度の書き出しをお勧めします。</p>
      <button class="btn btn-ghost" id="export-btn" style="margin-top:10px">JSONファイルに書き出す</button>
    </div>
    <div class="card">
      <div class="card-title">復元（読み込み）</div>
      <p class="note">書き出したJSONファイルからデータを復元します。<b>現在のデータはすべて置き換えられます。</b></p>
      <label class="btn btn-ghost" style="display:block;text-align:center;margin-top:10px">
        JSONファイルを読み込む
        <input type="file" id="import-input" accept=".json,application/json" style="display:none">
      </label>
    </div>
    <div class="card">
      <div class="card-title">保存先について</div>
      <p class="note">記録はこのブラウザ（この端末）の中にだけ保存され、外部には送信されません。別の端末やブラウザからは見えません。</p>
    </div>
  </section>
</main>

<!-- 編集モーダル -->
<div id="modal-overlay">
  <div id="modal">
    <h3>レコードを編集</h3>
    <div class="stack">
      <div class="grid2">
        <div><label class="field">日付</label><input type="date" id="m-date"></div>
        <div><label class="field">金額（円）*</label><input type="number" id="m-amount" inputmode="numeric" min="1"></div>
      </div>
      <div><label class="field">カテゴリ *</label><select id="m-category"></select></div>
      <div><label class="field">店名・支払先</label><input type="text" id="m-store"></div>
      <div><label class="field">メモ</label><input type="text" id="m-memo"></div>
    </div>
    <div class="modal-btns">
      <button class="btn btn-danger" id="m-delete">削除</button>
      <button class="btn btn-ghost" id="m-close">閉じる</button>
      <button class="btn btn-primary" id="m-save">保存する</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<nav>
  <button data-tab="input" class="on">入力</button>
  <button data-tab="monthly">月次</button>
  <button data-tab="trend">推移</button>
  <button data-tab="history">履歴</button>
  <button data-tab="data">データ</button>
</nav>

<script>
"use strict";

// ───────── 定数 ─────────
const EXPENSE_CATEGORIES = ["食費","日用品","住居費","水道光熱費","通信費","交通費","医療費","交際費","趣味・娯楽","衣服","その他"];
const INCOME_CATEGORIES  = ["給与","賞与","その他収入"];
const KEY_PREFIX = "kakeibo:records:";
const KEY_INDEX  = "kakeibo:months-index";

// ───────── ユーティリティ ─────────
const $ = (id) => document.getElementById(id);
const todayStr = () => {
  const d = new Date();
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
};
const currentYm = () => todayStr().slice(0,7);
const ymOf = (date) => date.slice(0,7);
const ymLabel = (ym) => ym.slice(0,4) + "年" + Number(ym.slice(5)) + "月";
const yen = (n) => "¥" + Math.abs(n).toLocaleString("ja-JP");
const signed = (n) => (n < 0 ? "−" : "") + yen(n);
const shiftYm = (ym, diff) => {
  const y = Number(ym.slice(0,4)), m = Number(ym.slice(5));
  const d = new Date(y, m - 1 + diff, 1);
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0");
};
const esc = (s) => String(s).replace(/[&<>"']/g, (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

// ───────── ストレージ層（localStorage） ─────────
function loadIndex() {
  try { return JSON.parse(localStorage.getItem(KEY_INDEX)) || []; } catch { return []; }
}
function saveIndex(list) {
  localStorage.setItem(KEY_INDEX, JSON.stringify([...list].sort().reverse()));
}
function loadMonth(ym) {
  try { return JSON.parse(localStorage.getItem(KEY_PREFIX + ym)) || []; } catch { return []; }
}
function saveMonth(ym, records) {
  localStorage.setItem(KEY_PREFIX + ym, JSON.stringify(records));
}
function addRecord(rec) {
  const ym = ymOf(rec.date);
  saveMonth(ym, [...loadMonth(ym), rec]);
  const idx = loadIndex();
  if (!idx.includes(ym)) saveIndex([...idx, ym]);
}
function removeRecord(id, ym) {
  const recs = loadMonth(ym).filter((r) => r.id !== id);
  saveMonth(ym, recs);
  if (recs.length === 0) {
    localStorage.removeItem(KEY_PREFIX + ym);
    saveIndex(loadIndex().filter((m) => m !== ym));
  }
}

// ───────── 集計 ─────────
function summarize(recs) {
  let income = 0, expense = 0;
  for (const r of recs) r.type === "income" ? income += r.amount : expense += r.amount;
  return { income, expense, balance: income - expense };
}
function categoryTotals(recs) {
  const map = {};
  for (const r of recs) if (r.type === "expense") map[r.category] = (map[r.category] || 0) + r.amount;
  return Object.entries(map).map(([category, amount]) => ({ category, amount })).sort((a,b) => b.amount - a.amount);
}

// ───────── 状態 ─────────
let tab = "input";
let selectedYm = currentYm();
let formType = "expense";
let typeFilter = "all";
let editing = null; // { id, ym }

// ───────── 共通UI ─────────
let toastTimer = null;
function toast(msg) {
  const t = $("toast");
  t.textContent = msg;
  t.style.display = "block";
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.style.display = "none"; }, 2500);
}
function fillCategories(select, type, value) {
  const cats = type === "income" ? INCOME_CATEGORIES : EXPENSE_CATEGORIES;
  select.innerHTML = cats.map((c) => `<option value="${esc(c)}">${esc(c)}</option>`).join("");
  if (value && cats.includes(value)) select.value = value;
}
function validate(dateEl, amountEl) {
  const amount = Math.round(Number(amountEl.value));
  if (!/^\d{4}-\d{2}-\d{2}$/.test(dateEl.value) || !Number.isFinite(amount) || amount <= 0) {
    toast("日付と正の金額を入力してください");
    return null;
  }
  return amount;
}

// ───────── 入力タブ ─────────
function setFormType(type) {
  formType = type;
  $("type-expense").className = type === "expense" ? "on-expense" : "";
  $("type-income").className  = type === "income"  ? "on-income"  : "";
  fillCategories($("f-category"), type);
  $("f-store-label").textContent = type === "income" ? "収入元" : "店名・支払先";
  $("f-store").placeholder = type === "income" ? "例: 勤務先" : "例: AEON";
  const save = $("f-save");
  save.textContent = type === "income" ? "収入を保存する" : "支出を保存する";
  save.className = "btn " + (type === "income" ? "btn-income" : "btn-primary");
}
function resetForm() {
  $("f-date").value = todayStr();
  $("f-amount").value = "";
  $("f-store").value = "";
  $("f-memo").value = "";
  fillCategories($("f-category"), formType);
}
$("type-expense").onclick = () => { setFormType("expense"); };
$("type-income").onclick  = () => { setFormType("income"); };
$("f-save").onclick = () => {
  const amount = validate($("f-date"), $("f-amount"));
  if (amount === null) return;
  addRecord({
    id: Date.now() + "-" + Math.random().toString(36).slice(2,7),
    type: formType, date: $("f-date").value, amount,
    category: $("f-category").value,
    store: $("f-store").value.trim(), memo: $("f-memo").value.trim(),
    source: "manual", createdAt: new Date().toISOString(),
  });
  toast((formType === "income" ? "収入" : "支出") + "を保存しました");
  resetForm();
};

// ───────── 月次タブ ─────────
function monthNavHtml() {
  return `<div class="month-nav">
    <button data-nav="-1">◀</button>
    <div class="label">${ymLabel(selectedYm)}</div>
    <button data-nav="1">▶</button>
  </div>`;
}
function bindMonthNav(section) {
  section.querySelectorAll("[data-nav]").forEach((b) => {
    b.onclick = () => { selectedYm = shiftYm(selectedYm, Number(b.dataset.nav)); render(); };
  });
}
function renderMonthly() {
  const el = $("tab-monthly");
  const recs = loadMonth(selectedYm);
  const sum = summarize(recs);
  const prevRecs = loadMonth(shiftYm(selectedYm, -1));
  const prevBalance = prevRecs.length ? summarize(prevRecs).balance : null;
  const cats = categoryTotals(recs);
  const surplus = sum.balance >= 0;
  const color = surplus ? "var(--ink)" : "var(--vermilion)";
  const maxCat = cats.length ? cats[0].amount : 1;

  el.innerHTML = monthNavHtml() + `
    <div class="card balance-card">
      <div class="balance-label">${ymLabel(selectedYm)}の収支</div>
      <div class="balance-amount num" style="color:${color}">${signed(sum.balance)}</div>
      <span class="badge" style="border-color:${color};color:${color}">${surplus ? "黒字" : "赤字"}</span>
      <div class="io-row">
        <div><span style="color:var(--sub)">収入 </span><span class="num" style="color:var(--indigo)">${yen(sum.income)}</span></div>
        <div><span style="color:var(--sub)">支出 </span><span class="num" style="color:var(--vermilion)">${yen(sum.expense)}</span></div>
      </div>
      ${prevBalance !== null ? `<div class="prev">前月比 ${sum.balance - prevBalance >= 0 ? "+" : "−"}${yen(sum.balance - prevBalance)}</div>` : ""}
    </div>
    <div class="card">
      <div class="card-title">カテゴリ別支出</div>
      ${cats.length === 0
        ? `<div class="empty">この月の支出はまだありません。入力タブから登録できます。</div>`
        : cats.map((c) => `
          <div class="cat-row">
            <div class="cat-name">${esc(c.category)}</div>
            <div class="cat-bar-wrap"><div class="cat-bar" style="width:${Math.max(2, c.amount / maxCat * 100)}%"></div></div>
            <div class="cat-amt num">${yen(c.amount)}</div>
          </div>`).join("")}
    </div>`;
  bindMonthNav(el);
}

// ───────── 推移タブ ─────────
function renderTrend() {
  const el = $("tab-trend");
  const idx = loadIndex();
  if (idx.length === 0) {
    el.innerHTML = `<div class="card"><div class="empty" style="text-align:center;padding:30px 0">まだデータがありません。入力タブから支出・収入を登録すると、月別の推移がここに表示されます。</div></div>`;
    return;
  }
  const rows = idx.map((ym) => ({ ym, ...summarize(loadMonth(ym)) }));
  const chartRows = [...rows].sort((a,b) => a.ym.localeCompare(b.ym)).slice(-12);
  const maxVal = Math.max(1, ...chartRows.flatMap((r) => [r.income, r.expense]));

  el.innerHTML = `
    <div class="card">
      <div class="card-title">収入と支出（直近12ヶ月）</div>
      <div class="trend-chart">
        ${chartRows.map((r) => `
          <div class="trend-col">
            <div class="trend-bars">
              <div class="tb tb-in" style="height:${Math.max(1, r.income / maxVal * 100)}%"></div>
              <div class="tb tb-ex" style="height:${Math.max(1, r.expense / maxVal * 100)}%"></div>
            </div>
            <div class="trend-mon">${Number(r.ym.slice(5))}月</div>
          </div>`).join("")}
      </div>
      <div class="legend">
        <span><span class="dot" style="background:var(--indigo)"></span>収入</span>
        <span><span class="dot" style="background:var(--vermilion)"></span>支出</span>
      </div>
    </div>
    <div class="card">
      <div class="card-title">月別収支（タップで月次へ）</div>
      <table>
        <thead><tr><th style="text-align:left">月</th><th class="r">収入</th><th class="r">支出</th><th class="r">収支</th></tr></thead>
        <tbody>
          ${rows.map((r) => `
            <tr data-ym="${r.ym}" style="cursor:pointer">
              <td>${ymLabel(r.ym)}</td>
              <td class="r num" style="color:var(--indigo)">${yen(r.income)}</td>
              <td class="r num" style="color:var(--vermilion)">${yen(r.expense)}</td>
              <td class="r num" style="color:${r.balance >= 0 ? "var(--ink)" : "var(--vermilion)"}">${signed(r.balance)}</td>
            </tr>`).join("")}
        </tbody>
      </table>
    </div>`;
  el.querySelectorAll("tr[data-ym]").forEach((tr) => {
    tr.onclick = () => { selectedYm = tr.dataset.ym; setTab("monthly"); };
  });
}

// ───────── 履歴タブ ─────────
function renderHistory() {
  const el = $("tab-history");
  const recs = loadMonth(selectedYm)
    .filter((r) => typeFilter === "all" || r.type === typeFilter)
    .sort((a,b) => (b.date + b.createdAt).localeCompare(a.date + a.createdAt));

  el.innerHTML = monthNavHtml() + `
    <div class="filters">
      ${[["all","すべて"],["expense","支出"],["income","収入"]].map(([t,l]) =>
        `<button class="chip ${typeFilter === t ? "on" : ""}" data-filter="${t}">${l}</button>`).join("")}
    </div>
    <div class="card" style="padding:4px 16px">
      ${recs.length === 0
        ? `<div class="empty">${ymLabel(selectedYm)}のレコードはありません。</div>`
        : recs.map((r) => `
          <div class="rec" data-id="${r.id}">
            <div class="rec-mark" style="background:${r.type === "income" ? "var(--indigo)" : "var(--vermilion)"}"></div>
            <div class="rec-body">
              <div class="rec-main">${esc(r.category)}${r.store ? `<span class="rec-store">${esc(r.store)}</span>` : ""}</div>
              <div class="rec-meta">${r.date}${r.memo ? "・" + esc(r.memo) : ""}</div>
            </div>
            <div class="rec-amt num" style="color:${r.type === "income" ? "var(--indigo)" : "var(--ink)"}">${r.type === "income" ? "" : "−"}${yen(r.amount)}</div>
          </div>`).join("")}
    </div>`;
  bindMonthNav(el);
  el.querySelectorAll(".chip").forEach((b) => {
    b.onclick = () => { typeFilter = b.dataset.filter; renderHistory(); };
  });
  el.querySelectorAll(".rec").forEach((row) => {
    row.onclick = () => openModal(row.dataset.id);
  });
}

// ───────── 編集モーダル ─────────
function openModal(id) {
  const rec = loadMonth(selectedYm).find((r) => r.id === id);
  if (!rec) return;
  editing = { id, ym: selectedYm, type: rec.type };
  $("m-date").value = rec.date;
  $("m-amount").value = rec.amount;
  fillCategories($("m-category"), rec.type, rec.category);
  $("m-store").value = rec.store || "";
  $("m-memo").value = rec.memo || "";
  $("modal-overlay").classList.add("show");
}
function closeModal() { editing = null; $("modal-overlay").classList.remove("show"); }
$("modal-overlay").onclick = (e) => { if (e.target === $("modal-overlay")) closeModal(); };
$("m-close").onclick = closeModal;
$("m-save").onclick = () => {
  const amount = validate($("m-date"), $("m-amount"));
  if (amount === null || !editing) return;
  const original = loadMonth(editing.ym).find((r) => r.id === editing.id);
  if (!original) { closeModal(); return; }
  removeRecord(editing.id, editing.ym);
  addRecord({
    ...original, date: $("m-date").value, amount,
    category: $("m-category").value,
    store: $("m-store").value.trim(), memo: $("m-memo").value.trim(),
  });
  closeModal();
  toast("更新しました");
  render();
};
$("m-delete").onclick = () => {
  if (!editing) return;
  if (!confirm("このレコードを削除しますか？")) return;
  removeRecord(editing.id, editing.ym);
  closeModal();
  toast("削除しました");
  render();
};

// ───────── データ（バックアップ・復元） ─────────
$("export-btn").onclick = () => {
  const idx = loadIndex();
  const payload = {
    app: "kakeibo", version: 1, exportedAt: new Date().toISOString(),
    months: Object.fromEntries(idx.map((ym) => [ym, loadMonth(ym)])),
  };
  const blob = new Blob([JSON.stringify(payload, null, 1)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "kakeibo-backup-" + todayStr() + ".json";
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(a.href), 5000);
  toast("書き出しました");
};
$("import-input").onchange = (e) => {
  const file = e.target.files[0];
  e.target.value = "";
  if (!file) return;
  if (!confirm("現在のデータをすべて置き換えて復元します。よろしいですか？")) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const payload = JSON.parse(reader.result);
      if (payload.app !== "kakeibo" || typeof payload.months !== "object") {
        throw new Error("形式が違います");
      }
      // 既存データを削除してから復元
      loadIndex().forEach((ym) => localStorage.removeItem(KEY_PREFIX + ym));
      const months = Object.keys(payload.months).filter((ym) => /^\d{4}-\d{2}$/.test(ym));
      months.forEach((ym) => saveMonth(ym, payload.months[ym]));
      saveIndex(months);
      toast("復元しました");
      render();
    } catch {
      toast("このファイルは家計簿のバックアップではありません");
    }
  };
  reader.onerror = () => toast("ファイルを読み込めませんでした");
  reader.readAsText(file);
};

// ───────── タブ切替・描画 ─────────
function setTab(next) {
  tab = next;
  document.querySelectorAll("nav button").forEach((b) => b.classList.toggle("on", b.dataset.tab === tab));
  ["input","monthly","trend","history","data"].forEach((t) => { $("tab-" + t).hidden = t !== tab; });
  render();
}
function render() {
  if (tab === "monthly") renderMonthly();
  if (tab === "trend") renderTrend();
  if (tab === "history") renderHistory();
}
document.querySelectorAll("nav button").forEach((b) => { b.onclick = () => setTab(b.dataset.tab); });

// ───────── 初期化 ─────────
setFormType("expense");
resetForm();
</script>
</body>
